<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexusFlow - AI Traffic Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        header { border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 30px; }
        h1 { margin: 0; color: #38bdf8; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #0f172a; padding: 20px; border-radius: 8px; border: 1px solid #334155; }
        .card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; }
        .value { font-size: 28px; font-weight: bold; color: #f8fafc; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn:hover { background: #7dd3fc; }
        #log-status { color: #f43f5e; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>NexusFlow 🚦</h1>
        <p>AI-Powered Adaptive Traffic Management Prototype</p>
    </header>

    <div class="grid">
        <div class="card">
            <h3>Current System Time</h3>
            <div class="value" id="disp-time">00:00</div>
        </div>
        <div class="card">
            <h3>Live Vehicle Count</h3>
            <div class="value" id="disp-count">0</div>
        </div>
        <div class="card">
            <h3>Signal Allocated Timer</h3>
            <div class="value" id="disp-timer" style="color: #4ade80;">15s</div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 30px; padding: 30px;">
        <h3>AI Decision Engine Status</h3>
        <div id="log-status" style="font-weight: bold; margin-top: 10px;">SYSTEM IDLE</div>
    </div>

    <button class="btn" onclick="startSimulation()">Run Live Simulation</button>
</div>

<script src="traffic_data.js"></script>
<script>
    let index = 0;
    function startSimulation() {
        if(typeof trafficLogs === 'undefined') {
            alert("Error: 'traffic_data.js' file same folder mein nahi mili!");
            return;
        }
        
        const interval = setInterval(() => {
            if (index >= trafficLogs.length) {
                clearInterval(interval);
                document.getElementById('log-status').innerText = "🏁 Simulation Complete!";
                document.getElementById('log-status').style.color = "#38bdf8";
                return;
            }

            const currentLog = trafficLogs[index];
            document.getElementById('disp-time').innerText = currentLog.time;
            document.getElementById('disp-count').innerText = currentLog.vehicles;
            document.getElementById('disp-timer').innerText = currentLog.timer + "s";
            
            const statusBox = document.getElementById('log-status');
            statusBox.innerText = currentLog.status;
            
            // Color changer logic for status
            if(currentLog.status.includes('EMERGENCY')) statusBox.style.color = '#ef4444';
            else if(currentLog.status.includes('HEAVY')) statusBox.style.color = '#f97316';
            else if(currentLog.status.includes('MODERATE')) statusBox.style.color = '#eab308';
            else statusBox.style.color = '#22c55e';

            index++;
        }, 1500); // Har data point ko 1.5 second tak screen par dikhayega
    }
</script>
</body>
</html>
